{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 text-center">📦 All Items</h2>

<!-- 🔥 FILTER BAR -->
<form method="GET" class="row mb-4">

<div class="col-md-3">
    <input type="text" name="location" class="form-control" placeholder="📍 Location">
</div>

<div class="col-md-3">
    <input type="text" name="category" class="form-control" placeholder="📂 Category">
</div>

<div class="col-md-3">
    <select name="type" class="form-control">
        <option value="">All</option>
        <option value="lost">Lost</option>
        <option value="found">Found</option>
    </select>
</div>

<div class="col-md-3">
    <button class="btn btn-warning w-100">Apply Filters</button>
</div>

</form>

<!-- 🔥 ITEMS -->
<div class="row">

{% for item in items %}
<div class="col-md-4 mb-4">

<div class="card shadow">

{% if item.image %}
<img src="{{ url_for('static', filename='uploads/' + item.image) }}" 
     class="card-img-top" style="height:200px; object-fit:cover;">
{% endif %}

<div class="p-3">

<h5>{{ item.title }}</h5>
<p>{{ item.description }}</p>

<p>📍 {{ item.location }}</p>
<p>📂 {{ item.category }}</p>

<span class="badge bg-{% if item.status=='open' %}success{% else %}secondary{% endif %}">
{{ item.status }}
</span>

{% if item.status == 'open' %}
<a href="/claim/{{item.id}}" class="btn btn-primary w-100 mt-2">Claim</a>
{% endif %}

</div>

</div>

</div>
{% endfor %}

</div>

{% endblock %}
