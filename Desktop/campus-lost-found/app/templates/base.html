<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Lost &amp; Found</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --page-bg: #f4f8ff;
    --text-primary: #102033;
    --text-secondary: #60708a;
    --surface: rgba(255, 255, 255, 0.78);
    --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.14);
    --shadow-md: 0 18px 40px rgba(59, 130, 246, 0.14);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.28), transparent 34%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.20), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, #eef5ff 54%, #f7fbff 100%);
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.2)),
        url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1600&q=80") center/cover;
    opacity: 0.12;
    pointer-events: none;
    z-index: -2;
}

.site-shell {
    position: relative;
    overflow: hidden;
}

.site-shell::before,
.site-shell::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(14px);
    z-index: -1;
}

.site-shell::before {
    width: 320px;
    height: 320px;
    top: 110px;
    left: -110px;
    background: rgba(125, 211, 252, 0.20);
}

.site-shell::after {
    width: 340px;
    height: 340px;
    right: -130px;
    top: 460px;
    background: rgba(196, 181, 253, 0.18);
}

.navbar {
    padding: 18px 0;
    background: rgba(255, 255, 255, 0.68);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.42);
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
}

.brand-mark {
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.04em;
    text-decoration: none;
}

.nav-actions {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.nav-pill {
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 0.92rem;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.nav-pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
}

.nav-pill-primary {
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    color: #fff;
}

.nav-pill-soft {
    background: rgba(255, 255, 255, 0.82);
    color: var(--text-primary);
    border: 1px solid rgba(148, 163, 184, 0.18);
}

.page-container {
    padding-top: 3rem;
    padding-bottom: 4rem;
}

.hero-panel {
    position: relative;
    padding: 4.5rem 2rem;
    border-radius: 32px;
    background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.72)),
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(16, 185, 129, 0.08));
    border: 1px solid rgba(255, 255, 255, 0.62);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
}

.hero-panel::before {
    content: "";
    position: absolute;
    width: 240px;
    height: 240px;
    top: -75px;
    right: -55px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(96, 165, 250, 0.26), transparent 65%);
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.9rem;
    border-radius: 999px;
    background: rgba(37, 99, 235, 0.10);
    color: #1d4ed8;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.02em;
    text-transform: uppercase;
}

.hero-title {
    margin-top: 1.2rem;
    margin-bottom: 1rem;
    font-size: clamp(2.6rem, 6vw, 4.7rem);
    line-height: 1.04;
    font-weight: 800;
    letter-spacing: -0.06em;
}

.hero-copy {
    max-width: 650px;
    margin: 0 auto;
    color: var(--text-secondary);
    font-size: 1.08rem;
    line-height: 1.8;
}

.hero-actions {
    margin-top: 2rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.btn-premium,
.btn-outline-premium {
    padding: 0.95rem 1.4rem;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.btn-premium {
    color: #fff;
    background: linear-gradient(135deg, #0f172a, #2563eb);
    box-shadow: 0 18px 38px rgba(37, 99, 235, 0.22);
}

.btn-outline-premium {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.84);
    border: 1px solid rgba(148, 163, 184, 0.22);
}

.btn-premium:hover,
.btn-outline-premium:hover {
    color: inherit;
    transform: translateY(-2px);
}

.section-block {
    margin-top: 4.5rem;
}

.section-heading {
    text-align: center;
    margin-bottom: 2.75rem;
}

.section-kicker {
    display: inline-block;
    padding: 0.45rem 0.95rem;
    border-radius: 999px;
    background: rgba(14, 165, 233, 0.11);
    color: #0369a1;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

.section-title {
    margin-top: 1rem;
    margin-bottom: 0.75rem;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.04em;
}

.section-subtitle {
    max-width: 620px;
    margin: 0 auto;
    color: var(--text-secondary);
    font-size: 1.04rem;
    line-height: 1.75;
}

.how-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1.5rem;
}

.how-card {
    position: relative;
    min-height: 320px;
    padding: 2rem;
    border-radius: 26px;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.52);
    box-shadow: 0 18px 44px rgba(15, 23, 42, 0.10);
    overflow: hidden;
    transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
}

.how-card::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.95;
}

.how-card-blue::before {
    background: linear-gradient(135deg, rgba(219, 234, 254, 0.95), rgba(239, 246, 255, 0.7));
}

.how-card-purple::before {
    background: linear-gradient(135deg, rgba(237, 233, 254, 0.96), rgba(250, 245, 255, 0.72));
}

.how-card-green::before {
    background: linear-gradient(135deg, rgba(220, 252, 231, 0.96), rgba(240, 253, 244, 0.72));
}

.how-card > * {
    position: relative;
    z-index: 1;
}

.how-card:hover {
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 28px 60px rgba(59, 130, 246, 0.18);
    border-color: rgba(255, 255, 255, 0.82);
}

.step-watermark {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 5rem;
    line-height: 1;
    font-weight: 800;
    letter-spacing: -0.08em;
    color: rgba(15, 23, 42, 0.08);
    z-index: 0;
}

.step-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 16px;
    color: #fff;
    font-size: 1.3rem;
    font-weight: 700;
    box-shadow: var(--shadow-md);
}

.step-chip-blue {
    background: linear-gradient(135deg, #38bdf8, #2563eb);
}

.step-chip-purple {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
}

.step-chip-green {
    background: linear-gradient(135deg, #34d399, #059669);
}

.step-meta {
    margin-top: 1.4rem;
    font-size: 0.82rem;
    font-weight: 700;
    color: rgba(15, 23, 42, 0.55);
    text-transform: uppercase;
    letter-spacing: 0.12em;
}

.step-title {
    margin-top: 0.9rem;
    margin-bottom: 0.85rem;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
}

.step-text {
    margin: 0;
    color: rgba(15, 23, 42, 0.72);
    font-size: 1rem;
    line-height: 1.8;
}

.reveal {
    opacity: 0;
    transform: translateY(36px);
    transition: opacity 0.8s ease, transform 0.8s ease;
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

@media (max-width: 991px) {
    .how-grid {
        grid-template-columns: 1fr;
    }

    .hero-panel {
        padding: 3.5rem 1.4rem;
        border-radius: 26px;
    }
}

@media (max-width: 767px) {
    .navbar .container {
        gap: 1rem;
    }

    .brand-mark,
    .nav-actions {
        width: 100%;
        justify-content: center;
        text-align: center;
    }

    .page-container {
        padding-top: 2rem;
    }

    .hero-title {
        font-size: 2.5rem;
    }

    .section-block {
        margin-top: 3.5rem;
    }
}
</style>
</head>

<body>
<div class="site-shell">
    <nav class="navbar">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <a href="/" class="brand-mark">Campus Lost &amp; Found</a>

            <div class="nav-actions">
                <a href="/items" class="nav-pill nav-pill-soft">Browse Items</a>
                {% if current_user.is_authenticated %}
                <a href="/post" class="nav-pill nav-pill-soft">Post Item</a>
                <a href="/dashboard" class="nav-pill nav-pill-soft">Dashboard</a>
                <a href="/logout" class="nav-pill nav-pill-primary">Logout</a>
                {% else %}
                <a href="/register" class="nav-pill nav-pill-soft">Register</a>
                <a href="/login" class="nav-pill nav-pill-primary">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container page-container">
        {% block content %}{% endblock %}
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const revealElements = document.querySelectorAll(".reveal");

    if (!revealElements.length) {
        return;
    }

    const observer = new IntersectionObserver(function (entries, obs) {
        entries.forEach(function (entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add("visible");
                obs.unobserve(entry.target);
            }
        });
    }, { threshold: 0.18 });

    revealElements.forEach(function (element) {
        observer.observe(element);
    });
});
</script>
</body>
</html>
